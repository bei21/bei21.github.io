name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to push the updated citations.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly PyYAML

      - name: Fetch Google Scholar citations
        run: python bin/fetch_citations.py

      - name: Commit and push if citations changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.yml
          if git diff --staged --quiet; then
            echo "No changes to citations.yml — skipping commit."
          else
            git commit -m "chore: update Google Scholar citations [skip ci]"
            git push
            echo "✅ citations.yml updated and pushed."
          fi
